load_module modules/ngx_http_js_module.so;

env HMAC_SECRET;

events {
    worker_connections 1024;
}

http {
    js_import hmac from /etc/nginx/hmac_verify.js;

    # Expose HMAC_SECRET to njs via a variable backed by a js_set function
    js_set $hmac_secret hmac.getSecret;

    upstream relayer {
        server relayer:4500;
    }

    server {
        listen 80;

        # Health check — unauthenticated, for Coolify probes
        location = /api/healthz {
            proxy_pass http://relayer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other API routes — HMAC-authenticated
        location /api/ {
            # Ensure the full request body is available to njs as r.requestText
            client_body_in_single_buffer on;
            client_body_buffer_size 1m;

            js_content hmac.verify;
        }

        # Internal location used after HMAC verification succeeds
        location @backend {
            proxy_pass http://relayer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
